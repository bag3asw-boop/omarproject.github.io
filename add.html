<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCourses|Personal Course Organizer</title>
    <link rel="stylesheet" href="add.css">
</head>
<body>

    <nav>
        <h2>MyCourses</h2>  
        <a href="index.html">Home</a>
        <a href="course.html">My Courses</a>
        <a href="add.html" class="he">Add course</a>
        <a href="contact.html">Contact us</a>
    </nav>

    <section>
        <form method="get">
            <h2 class="lo">Add Course</h2>

            <label for="name">Course name</label>
            <input type="text" placeholder="Course name" required id="name">

            <label for="name2">Instructor</label>
            <input type="text" placeholder="Instructor name" required id="name2">

            <label for="hour">Credit hours</label>
            <input type="number" placeholder="Credit hours" required id="hour">

            <label for="note">Notes</label>
            <textarea placeholder="Write here..." required id="note"></textarea>

            <button type="submit">Submit</button>
        </form>
    </section>

</body>
</html>
